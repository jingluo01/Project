version: '3.8'

services:
  # --- Frontend Nginx Service ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_parking_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - parking_network

  # --- Backend Flask Service ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_parking_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - EVENTLET_NO_GREENDNS=yes
      # Database connection (matches service name 'mysql')
      - DATABASE_URL=mysql+pymysql://root:123456@mysql:3306/campus_parking
      - SCHOOL_DATABASE_URL=mysql+pymysql://root:123456@mysql:3306/school_official
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - parking_network

  # --- MySQL Database Service ---
  mysql:
    image: mysql:8.0
    container_name: campus_parking_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: campus_parking
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Optional: Auto-import database snapshot on first start
      - ./database:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  # --- Redis Cache Service ---
  redis:
    image: redis:7-alpine
    container_name: campus_parking_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - parking_network

volumes:
  mysql_data:
  redis_data:

networks:
  parking_network:
    driver: bridge
